services:

  backend:
    build: ./backend
    restart: always
    volumes:
      - backend_data:/usr/src/app/data
      - backend_uploads:/usr/src/app/uploads
    environment:
      - PORT=${PORT:-8081}
      - NODE_ENV=${NODE_ENV:-production}
      - ZITADEL_DOMAIN=${ZITADEL_DOMAIN}
      - DB_PATH=${DB_PATH:-./data/material_library.db}
      - UPLOAD_PATH=${UPLOAD_PATH:-./uploads}
      - FRONTEND_URL=${FRONTEND_URL}
      - APP_URL=${APP_URL}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-}
      - BREVO_API_KEY=${BREVO_API_KEY:-}
      - BREVO_FROM_EMAIL=${BREVO_FROM_EMAIL:-}
      - BREVO_FROM_NAME=${BREVO_FROM_NAME:-}
    command: ["npm", "start"]
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.coolify
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_ZITADEL_AUTHORITY: ${VITE_ZITADEL_AUTHORITY}
        VITE_ZITADEL_CLIENT_ID: ${VITE_ZITADEL_CLIENT_ID}
    restart: always
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  backend_data:
  backend_uploads:

networks:
  app-network:
    driver: bridge
