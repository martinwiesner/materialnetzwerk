server {
    listen 80;
    server_name localhost materialien.reallabor-zekiwa-zeitz.de;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Uploads zum Backend proxyen (^~ verhindert dass Regex-Locations greifen)
    location ^~ /uploads {
        proxy_pass http://backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
        add_header Access-Control-Allow-Origin *;
        add_header Cross-Origin-Resource-Policy cross-origin;
    }

    # API zum Backend proxyen
    location ^~ /api {
        proxy_pass http://backend:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Statische Assets cachen (nur JS/CSS/Fonts, keine Bilder — die kommen vom Backend)
    location ~* \.(js|css|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
