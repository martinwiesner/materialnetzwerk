<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RZZ Materialien</title>
    <meta name="description" content="Materialien · Projekte · Akteure" />
    <meta property="og:title" content="RZZ Materialien" />
    <meta property="og:description" content="Materialien · Projekte · Akteure" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://materialien.reallabor-zekiwa-zeitz.de" />
  </head>
  <style>
    #app-loader {
      position: fixed; inset: 0; z-index: 99999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: #f9fafb;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #app-loader.hidden { opacity: 0; visibility: hidden; }
    .loader-spinner {
      width: 44px; height: 44px;
      border: 4px solid #e5e7eb;
      border-top-color: #3b6e14;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loader-title {
      margin-top: 18px; font-size: 17px; font-weight: 700;
      color: #1f2937; letter-spacing: -0.01em;
    }
    .loader-sub {
      margin-top: 4px; font-size: 13px; color: #6b7280;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
  <body>
    <div id="app-loader">
      <div class="loader-spinner"></div>
      <div class="loader-title">RZZ Materialien</div>
      <div class="loader-sub">Plattform wird geladen…</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
