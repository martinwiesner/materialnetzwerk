services:

  backend:
    build: ./backend
    restart: always
    ports:
      - "8081:8081"
    volumes:
      - ./data:/usr/src/app/data
      - ./backend/uploads:/usr/src/app/uploads
    env_file:
      - ./backend/.env
    command: ["npm", "start"]
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
